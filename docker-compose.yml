version: '3.9'

services:
  db:
    image: postgres:16-alpine
    container_name: prompts_db
    environment:
      POSTGRES_DB: prompts_db
      POSTGRES_USER: prompts_user
      POSTGRES_PASSWORD: prompts_pass
    volumes:
      - postgres_data:/var/lib/postgresql/data
    ports:
      - "5432:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U prompts_user -d prompts_db"]
      interval: 5s
      timeout: 5s
      retries: 10

  redis:
    image: redis:7-alpine
    container_name: prompts_redis
    ports:
      - "6379:6379"
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 3s
      retries: 10

  backend:
    build:
      context: .
      dockerfile: backend/Dockerfile
    container_name: prompts_backend
    environment:
      USE_POSTGRES: "true"
      POSTGRES_DB: prompts_db
      POSTGRES_USER: prompts_user
      POSTGRES_PASSWORD: prompts_pass
      POSTGRES_HOST: db
      POSTGRES_PORT: 5432
      REDIS_HOST: redis
      REDIS_PORT: 6379
      ALLOWED_HOSTS: "*"
    depends_on:
      db:
        condition: service_healthy
      redis:
        condition: service_healthy
    ports:
      - "8000:8000"

  frontend:
    build:
      context: .
      dockerfile: frontend/Dockerfile
    container_name: prompts_frontend
    depends_on:
      - backend
    ports:
      - "4200:80"

volumes:
  postgres_data:
